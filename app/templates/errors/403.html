{% extends "base.html" %}

{% block title %}Access Forbidden{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="display-1">403</h1>
    <p class="fs-3"><span class="text-danger">Access Denied!</span></p>
    <p class="lead">You don't have permission to access this resource.</p>
    <a href="{{ url_for('web.dashboard.index') if current_user.is_authenticated else url_for('web.auth.login') }}" 
       class="btn btn-primary">Go Back Home</a>
</div>
{% endblock %}
